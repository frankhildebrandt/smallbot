runtimeDir: ".runtime"
sandboxMode: "auto"

services:
  - name: "ai:1"
    kind: "ai"
    module: "ai-free"
    permissions:
      networking: true
    environment:
      PROVIDER: "openai"
      OPEN_AI_KEY: ""
      OPEN_AI_MODEL: "gpt-5.4-mini"
  - name: "worker:1"
    kind: "worker"
    module: "task-worker"
    permissions:
      networking: false
    environment:
      WORKER_AI_KIND: "ai"
  - name: "search:1"
    kind: "search"
    module: "web-search"
    permissions:
      networking: true
    environment:
      SEARCH_SEARXNG_BASE_URL: ""
